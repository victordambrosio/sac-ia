<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conectando... — SAC IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--surface3:#252830;--border:#2a2d35;--border2:#353840;--accent:#ffe234;--text:#f0f0f0;--text2:#9a9da6;--text3:#5a5d66;--green:#2ecc71;--green-bg:rgba(46,204,113,0.1);--red:#e74c3c;--red-bg:rgba(231,76,60,0.1);--radius:10px;--radius-sm:6px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:520px;width:100%;}
  .logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);letter-spacing:.1em;margin-bottom:20px;text-align:center;}
  h2{font-size:17px;font-weight:600;margin-bottom:6px;}
  p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;}
  .code-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);white-space:pre-wrap;word-break:break-all;margin:8px 0;}
  .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:12px;display:block;}
  textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);min-height:90px;resize:vertical;}
  textarea:focus{outline:none;border-color:var(--accent);}
  .btn{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;width:100%;margin-top:10px;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#ffb800;}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:6px;}
  .s-success{background:var(--green-bg);border:1px solid rgba(46,204,113,.3);color:var(--green);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;margin-top:10px;}
  .s-error{background:var(--red-bg);border:1px solid rgba(231,76,60,.3);color:var(--red);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;margin-top:10px;}
  .s-info{background:rgba(255,226,52,.06);border:1px solid rgba(255,226,52,.2);color:var(--accent);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;margin-top:10px;}
  .copy-btn{font-family:'Sora',sans-serif;font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--surface3);color:var(--text3);cursor:pointer;margin-top:4px;}
  .copy-btn:hover{color:var(--text);}
  .account-badge{font-family:'DM Mono',monospace;font-size:14px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;display:inline-block;margin:10px 0;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,226,52,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SAC·IA</div>
  <div id="content">
    <div style="text-align:center;padding:20px 0;">
      <div class="spinner"></div>
      <span style="font-size:13px;color:var(--text2);">Processando...</span>
    </div>
  </div>
</div>

<script>
function getCreds(){try{return JSON.parse(localStorage.getItem('mlCreds')||'{}')}catch{return{}}}
function saveCreds(obj){localStorage.setItem('mlCreds',JSON.stringify({...getCreds(),...obj}))}

const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');

window.onload = function() {
  if (error) { showError('Autorização negada pelo Mercado Livre: ' + error); return; }
  if (!code) { showError('Código não encontrado na URL. Volte e tente novamente.'); return; }
  const creds = getCreds();
  if (!creds.clientId || !creds.clientSecret) {
    showError('Credenciais não encontradas. <a href="conectar.html" style="color:var(--accent)">Volte ao passo 2</a> e salve o Client ID e Secret.');
    return;
  }
  saveCreds({authCode: code});
  showCurlStep(code, creds);
};

function showCurlStep(code, creds) {
  const redirectUri = window.location.origin + window.location.pathname;
  const cmd = 'curl -X POST "https://api.mercadolibre.com/oauth/token" -H "Content-Type: application/x-www-form-urlencoded" -d "grant_type=authorization_code&client_id=' + creds.clientId + '&client_secret=' + creds.clientSecret + '&code=' + code + '&redirect_uri=' + redirectUri + '"';

  document.getElementById('content').innerHTML =
    '<h2 style="color:var(--green)">✓ ML autorizou o acesso!</h2>' +
    '<p>Agora precisamos gerar o token. Abra o <strong>Prompt de Comando</strong> (CMD) no Windows, cole o comando abaixo e pressione Enter:</p>' +
    '<span class="label">Comando para o CMD:</span>' +
    '<div class="code-box" id="cmdBox">' + cmd + '</div>' +
    '<button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById(\'cmdBox\').textContent);this.textContent=\'Copiado!\';setTimeout(()=>this.textContent=\'Copiar comando\',1500)">Copiar comando</button>' +
    '<span class="label" style="margin-top:16px;">Cole aqui o resultado que apareceu no CMD:</span>' +
    '<textarea id="jsonInput" placeholder=\'{"access_token":"APP_USR-...","refresh_token":"TG-...","user_id":123456}\' oninput="document.getElementById(\'btnConnect\').disabled=this.value.trim().length<10"></textarea>' +
    '<button class="btn btn-primary" id="btnConnect" onclick="processToken()" disabled>Conectar conta →</button>' +
    '<button class="btn btn-ghost" onclick="window.location.href=\'conectar.html\'">← Voltar</button>' +
    '<div id="status"></div>';
}

async function processToken() {
  const raw = document.getElementById('jsonInput').value.trim();
  const st = document.getElementById('status');
  try {
    const data = JSON.parse(raw);
    if (!data.access_token) throw new Error('Campo access_token não encontrado. Verifique se colou o JSON completo.');
    saveCreds({accessToken: data.access_token, refreshToken: data.refresh_token, expiresIn: data.expires_in, tokenTime: Date.now()});
    st.innerHTML = '<div class="s-info"><span class="spinner"></span>Buscando dados da conta...</div>';
    const r = await fetch('https://api.mercadolibre.com/users/me', {headers:{'Authorization':'Bearer '+data.access_token}});
    const user = await r.json();
    if (!user.id) throw new Error('Token inválido ou expirado.');
    saveCreds({connected:true, nickname: user.nickname||user.email, userId: user.id});
    showSuccess(user.nickname||user.email);
  } catch(e) {
    st.innerHTML = '<div class="s-error">Erro: ' + e.message + '</div>';
  }
}

function showSuccess(nickname) {
  document.getElementById('content').innerHTML =
    '<div style="text-align:center">' +
    '<div style="font-size:40px;margin-bottom:12px;">✓</div>' +
    '<h2 style="color:var(--green);margin-bottom:6px;">Conta conectada!</h2>' +
    '<p>Sua conta foi autorizada com sucesso.</p>' +
    '<div class="account-badge">' + nickname + '</div>' +
    '<p>As perguntas da sua loja aparecem no painel em tempo real.</p>' +
    '<button class="btn btn-primary" onclick="window.location.href=\'index.html\'" style="margin-top:12px;">→ Abrir painel SAC</button>' +
    '</div>';
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div style="text-align:center">' +
    '<div style="font-size:32px;margin-bottom:12px;">✕</div>' +
    '<h2 style="color:var(--red);margin-bottom:8px;">Erro na conexão</h2>' +
    '<div class="s-error">' + msg + '</div>' +
    '<button class="btn btn-ghost" onclick="window.location.href=\'conectar.html\'" style="margin-top:12px;">← Voltar e tentar novamente</button>' +
    '</div>';
}
</script>
</body>
</html>
